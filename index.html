<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Xuân Của Chúng Ta</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast" class="toast">Nội dung thông báo</div>

    <div id="login-mask" class="modal-login" style="display: none;">
        <div class="login-box">
            <span class="close-btn" onclick="document.getElementById('login-mask').style.display='none'">&times;</span>
            <h2>Đăng nhập</h2>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Tài khoản: ban[số_thứ_tự]@lop.com</p>
            <input type="email" id="login-email" placeholder="Ví dụ: ban23@lop.com">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button onclick="handleLogin()">Đăng nhập</button>
        </div>
    </div>

    <div id="music-modal" class="modal" onclick="closeModal(event, 'music-modal')" style="display: none;">
        <div class="modal-box playlist-box">
            <span class="close-btn" onclick="document.getElementById('music-modal').style.display='none'">&times;</span>
            <div class="now-playing">
                <img id="np-img" src="https://placehold.co/100x100/1dd1a1/white?text=Music" alt="Playing">
                <div class="np-info">
                    <h4 id="np-title">Chưa phát nhạc</h4>
                    <div class="np-controls">
                        <svg onclick="prevSong()" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        <svg onclick="togglePlayMusic()" id="play-pause-btn" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg onclick="nextSong()" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </div>
                </div>
            </div>
            <div class="playlist-items" id="playlist-container"></div>
        </div>
    </div>
    <audio id="main-audio" src=""></audio>

    <nav>
        <div class="nav-container">
            <a href="#" class="logo">Thanh Xuân</a>
            <ul class="nav-links">
                <li><a href="#trang-chu">Trang chủ</a></li>
                <li><a href="#thanh-vien">Thành viên</a></li>
                <li><a href="#khoanh-khac">Khoảnh khắc</a></li>
            </ul>
            <div class="nav-right">
                <button class="btn-menu" onclick="document.getElementById('music-modal').style.display='flex'">Nhạc</button>
                <button class="btn-logout" id="auth-btn" onclick="toggleAuth()">Đăng nhập</button>
            </div>
        </div>
    </nav>

    <section id="trang-chu">
        <div class="hero-content">
            <h1>Thanh Xuân Của Chúng Ta</h1>
            <p>"Những năm tháng rực rỡ dưới mái trường thân yêu"</p>
        </div>
    </section>

    <section id="thanh-vien" class="container">
        <h2 class="section-title">Thành Viên</h2>
        <div class="grid-members" id="member-container"></div>
        <button id="btn-load-more-members" class="btn-load-more" onclick="loadAllMembers()">Xem thêm thành viên</button>
    </section>

    <section id="khoanh-khac" class="container">
        <h2 class="section-title">Khoảnh Khắc</h2>
        <div class="grid-moments" id="moment-container"></div>
        <button id="btn-load-more-moments" class="btn-load-more" onclick="loadAllMoments()">Xem thêm ảnh</button>
    </section>

    <div id="member-modal" class="modal" onclick="closeModal(event, 'member-modal')" style="display: none;">
        <div class="modal-box member-detail-box">
            <span class="close-btn" onclick="document.getElementById('member-modal').style.display='none'">&times;</span>
            <div id="view-mode">
                <div id="modal-avatar-container">
                    <img id="modal-member-img" src="" alt="Avatar" style="display: none;">
                    <div id="modal-placeholder-avatar" class="placeholder-avatar-round" style="display: none;"></div>
                </div>
                <h3 id="modal-member-name">Tên Thành Viên</h3>
                <div class="info-group">
                    <p id="modal-member-hobbies"></p>
                </div>
                <button id="btn-edit-profile" class="btn-action" style="display: none; margin-top: 15px;" onclick="enableEditMode()">Sửa thông tin của tôi</button>
            </div>
            <div id="edit-mode" style="display: none;">
                <h3>Cập Nhật Hồ Sơ</h3>
                <input type="text" id="edit-name" placeholder="Họ và Tên" class="edit-input">
                <input type="text" id="edit-avatar" placeholder="Link ảnh (URL)" class="edit-input">
                <textarea id="edit-hobbies" placeholder="Sở thích..." class="edit-input" rows="3"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-action" onclick="saveProfile()">Lưu</button>
                    <button class="btn-action btn-cancel" onclick="cancelEditMode()">Hủy</button>
                </div>
            </div>
        </div>
    </div>

    <div id="moment-modal" class="modal" onclick="closeModal(event, 'moment-modal')" style="display: none;">
        <div class="modal-box zoom-box">
            <span class="close-btn" onclick="document.getElementById('moment-modal').style.display='none'">&times;</span>
            <img id="zoom-img" src="" alt="Zoom">
            <div class="reaction-bar">
                <span onclick="addReaction('❤️')">❤️</span>
                <span onclick="addReaction('😂')">😂</span>
                <span onclick="addReaction('😮')">😮</span>
                <span onclick="addReaction('👍')">👍</span>
            </div>
            <div id="zoom-reaction-stats" class="zoom-stats"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
