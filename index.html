<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cod kỉ niệm</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-mask" class="modal-login">
        <div class="login-box">
            <h2>Đăng nhập lớp mình</h2>
            <input type="email" id="login-email" placeholder="Email (ban1@lop.com)">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button onclick="handleLogin()">Vào xem kỉ niệm</button>
        </div>
    </div>

    <nav>
        <div class="nav-container">
            <a href="#" class="logo">Thanh xuân</a>
            <div class="nav-right">
                <div class="music-player">
                    <select id="bg-music-select">
                        <option value="">🎵 Nhạc</option>
                        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Kỉ niệm 1</option>
                    </select>
                    <audio id="audio-player" loop></audio>
                </div>
                <button class="btn-logout" onclick="firebase.auth().signOut()">Thoát</button>
            </div>
        </div>
    </nav>

    <section id="trang-chu">
        <h1>Thanh xuân của chúng ta</h1>
    </section>

    <section class="container">
        <h2 class="section-title">Thành viên lớp</h2>
        <div class="grid-members" id="member-container"></div>
    </section>

    <section class="container">
        <h2 class="section-title">Khoảnh khắc</h2>
        <div class="grid-moments" id="moment-container"></div>
    </section>

    <div id="photo-modal" class="modal">
        <div class="modal-content photo-layout">
            <span class="close-btn" onclick="closeModal('photo-modal')">&times;</span>
            <div class="modal-left">
                <div class="image-wrapper">
                    <img id="modal-photo-img" src="">
                    <div id="reaction-summary" class="reaction-summary"></div>
                </div>
                <div class="reaction-bar">
                    <span onclick="sendReaction('👍')">👍</span>
                    <span onclick="sendReaction('❤️')">❤️</span>
                    <span onclick="sendReaction('😂')">😂</span>
                    <span onclick="sendReaction('😮')">😮</span>
                    <span onclick="sendReaction('😢')">😢</span>
                </div>
            </div>
            <div class="modal-right">
                <div class="chat-header">Bình luận</div>
                <div class="comment-list" id="modal-comments"></div>
                <div class="comment-box">
                    <input type="text" id="new-comment" placeholder="Viết phản hồi...">
                    <button onclick="postComment()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
