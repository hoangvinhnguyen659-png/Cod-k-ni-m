<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Xuân Của Chúng Ta</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-mask" class="modal-login" style="display: none;">
        <div class="login-box">
            <span class="close-btn" onclick="document.getElementById('login-mask').style.display='none'">&times;</span>
            <h2>Đăng nhập lớp mình</h2>
            <input type="email" id="login-email" placeholder="Email (ban1@lop.com)">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button onclick="handleLogin()">Đăng nhập</button>
        </div>
    </div>

    <nav>
        <div class="nav-container">
            <a href="#trang-chu" class="logo">Thanh Xuân</a>
            <ul class="nav-links">
                <li><a href="#trang-chu">Trang chủ</a></li>
                <li><a href="#thanh-vien">Thành viên</a></li>
                <li><a href="#khoanh-khac">Khoảnh khắc</a></li>
                <li><a href="#luu-but">Lưu bút</a></li>
            </ul>
            <div class="nav-right">
                <button class="btn-menu" onclick="document.getElementById('music-modal').style.display='flex'">
                    <svg class="custom-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    Playlist
                </button>
                <button class="btn-logout" id="auth-btn" onclick="toggleAuth()">Đăng nhập</button>
            </div>
        </div>
    </nav>

    <section id="trang-chu">
        <div class="hero-content">
            <h1>Thanh Xuân Của Chúng Ta</h1>
            <p>"Những năm tháng rực rỡ dưới mái trường thân yêu"</p>
        </div>
    </section>

    <section id="thanh-vien" class="container">
        <h2 class="section-title">Thành Viên (Sĩ số: 42)</h2>
        <div class="grid-members" id="member-container"></div>
        <button id="load-more-members" class="btn-load-more" onclick="loadMoreMembers()">Xem thêm thành viên</button>
    </section>

    <section id="khoanh-khac" class="container">
        <h2 class="section-title">Khoảnh khắc</h2>
        <div class="grid-moments" id="moment-container"></div>
        <button id="load-more-moments" class="btn-load-more" onclick="loadMoreMoments()">Xem thêm ảnh</button>
    </section>

    <section id="luu-but" class="container">
        <h2 class="section-title">Những Lời Nhắn Nhủ (42 Lưu Bút)</h2>
        <div class="grid-notes" id="notes-container"></div>
        <button id="load-more-notes" class="btn-load-more" onclick="loadMoreNotes()">Xem thêm lời nhắn</button>
    </section>

    <div id="member-modal" class="modal" onclick="closeModal(event, 'member-modal')">
        <div class="modal-box member-detail-box">
            <span class="close-btn" onclick="document.getElementById('member-modal').style.display='none'">&times;</span>
            <img id="modal-member-img" src="" alt="Avatar">
            <h3 id="modal-member-name">Tên Thành Viên</h3>
            <div class="info-group">
                <svg class="custom-icon" viewBox="0 0 24 24" fill="currentColor" style="color: #ff7675;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <p id="modal-member-hobbies"></p>
            </div>
        </div>
    </div>

    <div class="spotify-player">
        <div class="sp-left">
            <img id="sp-cover" src="https://via.placeholder.com/100" alt="Cover">
            <div class="sp-info"><h4 id="sp-title">Đang tải...</h4><p id="sp-artist">---</p></div>
        </div>
        <div class="sp-center">
            <div class="sp-controls">
                <svg onclick="prevSong()" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                <div id="sp-play-btn" onclick="togglePlay()">
                    <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <svg onclick="nextSong()" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <input type="range" id="sp-progress-bar" value="0" max="100" onchange="seekSong()">
        </div>
        <audio id="audio-player"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
