<!DOCTYPE html>
<html>
<head>
    <title>Tạo tài khoản tự động</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <h3>Đang tạo 42 tài khoản... Xem kết quả ở Console (F12)</h3>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCNzWm4KPPNA06L0RCxK6blA2-SudRVw3U",
            authDomain: "cod-ki-niem.firebaseapp.com",
            projectId: "cod-ki-niem",
            appId: "1:564135267081:web:ddc21cee697090914a61d8"
        };
        firebase.initializeApp(firebaseConfig);

        async function createUsers() {
            for (let i = 1; i <= 42; i++) {
                const email = `ban${i}@lop.com`;
                const password = "123123"; // Mật khẩu chung ban đầu
                try {
                    await firebase.auth().createUserWithEmailAndPassword(email, password);
                    console.log(`Đã tạo thành công: ${email}`);
                } catch (error) {
                    console.log(`Lỗi hoặc đã tồn tại: ${email}`);
                }
            }
            alert("Đã xong! Bạn vào mục Authentication trong Firebase để kiểm tra nhé.");
        }
        createUsers();
    </script>
</body>
</html>
